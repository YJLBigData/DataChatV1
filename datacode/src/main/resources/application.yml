server:
  port: ${DATACODE_SERVER_PORT:18082}
  # 作为 DataChatV1 子服务，统一上下文路径 /datacode；Nginx 把 /datacode/* 反代到此端口。
  servlet:
    context-path: ${DATACODE_CONTEXT_PATH:/datacode}
    session:
      cookie:
        http-only: true
        same-site: lax

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 120MB
  web:
    resources:
      static-locations: classpath:/static/

datacode:
  database-path: ${DATACODE_DB_PATH:logs/datacode-java.db}
  upload-dir: ${DATACODE_UPLOAD_DIR:storage/uploads}
  model:
    provider-id: qwen-dashscope
    model-name: ${DATACODE_LLM_MODEL:qwen3.6-max-preview}
    base-url: ${DATACODE_LLM_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    api-key: ${DATACODE_LLM_API_KEY:${DASHSCOPE_API_KEY:${QWEN_API_KEY:}}}
    temperature: ${DATACODE_LLM_TEMPERATURE:0.1}
    max-tokens: ${DATACODE_LLM_MAX_TOKENS:12000}
  maxcompute:
    access-key-id: ${ALIYUN_DATA_PLATFORM_AK:${ODPS_ACCESS_KEY_ID:}}
    access-key-secret: ${ALIYUN_DATA_PLATFORM_SK:${ODPS_ACCESS_KEY_SECRET:}}
    endpoint: ${ODPS_ENDPOINT:http://service.cn-beijing.maxcompute.aliyun.com/api}
    default-project: ${DATAPHIN_DEFAULT_PROJECT:firmus_dataphin_prd_ads}
    readonly-max-limit: ${DATACODE_READONLY_MAX_LIMIT:1000}
  sso:
    # DataChat SSO 开关：开启时禁用本地用户名/密码登录，全部走 DataChatV1 的 Bearer Token。
    enabled: ${DATACODE_SSO_ENABLED:true}
    # DataChatV1 后端基址（同机部署默认 127.0.0.1:8001）；仅服务端内网调用 /api/me 校验 token。
    datachat-base-url: ${DATACODE_SSO_DATACHAT_BASE_URL:http://127.0.0.1:8001}
    # /api/me 校验结果的内存缓存秒数：避免高频转发；TTL 内沿用同 token 鉴权结果。
    cache-seconds: ${DATACODE_SSO_CACHE_SECONDS:60}
    # 没有 token 时前端引导回 DataChat 登录页（相对路径，由浏览器走同域反代）。
    login-redirect: ${DATACODE_SSO_LOGIN_REDIRECT:/web/#/chat}
